body{font-family:Arial,sans-serif;background:#f5f5f5;margin:0;padding:0;}
nav{background:#222;padding:15px;display:flex;gap:20px;}
nav a{color:white;text-decoration:none;font-size:18px;}
nav a:hover{text-decoration:underline;}
h1{text-align:center;margin-top:20px;}

.page{display:none;padding:20px;}
.page.active{display:block;}

.filters{margin:20px 0;display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
select{padding:8px;border-radius:6px;border:1px solid #ccc;}

.animal-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:15px;margin-top:20px;}
.animal-box{background:white;padding:15px;border-radius:14px;text-align:center;box-shadow:0 2px 6px rgba(0,0,0,0.15);border:2px solid transparent;}
.animal-box .name{font-size:18px;font-weight:bold;}
.animal-box .rarity{margin-top:4px;font-size:14px;color:#444;}
.animal-box .chance{margin-top:6px;font-size:13px;color:#666;}
.animal-box .desc{margin-top:8px;font-size:12px;color:#555;}
.animal-box .region{margin-top:4px;font-size:11px;color:#777;}
.unknown{background:#dcdcdc;color:#777;font-style:italic;}

.rarity-common{color:#7d7d7d;}
.rarity-uncommon{color:#3aa655;}
.rarity-rare{color:#2b6bd6;}
.rarity-epic{color:#a335ee;}
.rarity-legendary{color:#ff8c00;}
.rarity-mythic{color:#e62e7a;}
.rarity-ancient{color:#b8860b;}
.rarity-celestial{
 background:linear-gradient(90deg,#ff00ff,#00eaff,#ffe600);
 -webkit-background-clip:text;
 color:transparent;
 font-weight:bold;
}

.animal-box.common{border:2px solid #7d7d7d55;}
.animal-box.uncommon{border:2px solid #3aa65555;}
.animal-box.rare{border:2px solid #2b6bd655;}
.animal-box.epic{border:2px solid #a335ee55;}
.animal-box.legendary{border:2px solid #ff8c0055;}
.animal-box.mythic{border:2px solid #e62e7a55;}
.animal-box.ancient{border:2px solid #b8860b55;}
.animal-box.celestial{border:2px solid #ffe600aa;box-shadow:0 0 12px #ffe60088;}

.achievements-list{max-width:800px;margin:0 auto;display:flex;flex-direction:column;gap:20px;}
.achievement-box{background:white;padding:20px;border-radius:14px;box-shadow:0 2px 6px rgba(0,0,0,0.15);border-left:8px solid transparent;}
.achievement-title{font-size:20px;font-weight:bold;}
.achievement-desc{margin-top:6px;font-size:14px;color:#555;}
.achievement-progress{margin-top:10px;font-size:13px;color:#777;}

.achievement-common{border-left-color:#7d7d7d;}
.achievement-uncommon{border-left-color:#3aa655;}
.achievement-rare{border-left-color:#2b6bd6;}
.achievement-epic{border-left-color:#a335ee;}
.achievement-legendary{border-left-color:#ff8c00;}
.achievement-mythic{border-left-color:#e62e7a;}
.achievement-ancient{border-left-color:#b8860b;}
.achievement-celestial{border-left-color:#ffe600;}

body.dark {
    background:#111;
    color:#eee;
}

/* Top bar becomes white in dark mode */
body.dark nav {
    background:#fff;
}

body.dark nav a {
    color:#000;
}

/* Toggle button in dark mode */
body.dark #darkModeBtn {
    background:#000;
    color:#fff;
    border:1px solid #444;
}

/* Cards */
body.dark .animal-box,
body.dark .achievement-box {
    background:#1a1a1a;
    color:#eee;
    box-shadow:0 2px 6px rgba(255,255,255,0.1);
}

/* Undiscovered animals */
body.dark .unknown {
    background:#333;
    color:#aaa;
}

/* Dropdowns */
body.dark select {
    background:#222;
    color:#eee;
    border:1px solid #555;
}

/* Roll result text */
body.dark #result {
    color:#fff;
}

/* Smooth theme transitions */
body, nav, .animal-box, .achievement-box, select {
    transition: background-color .35s ease, 
                color .35s ease, 
                border-color .35s ease, 
                box-shadow .35s ease;
}
/* Locked achievements appear grayed out */
.achievement-box.locked {
    opacity: 0.45;
    filter: grayscale(100%);
    transition: opacity .35s ease, filter .35s ease;
}

/* Unlocked achievements fade in */
.achievement-box.unlocked {
    opacity: 1;
    filter: grayscale(0%);
    transition: opacity .35s ease, filter .35s ease;
}

/* Dark mode adjustments */
body.dark .achievement-box.locked {
    opacity: 0.35;
    filter: grayscale(100%);
}

#animalProgressContainer {
    width: 80%;
    height: 20px;
    background: #ddd;
    border-radius: 12px;
    margin: 0 auto;
    overflow: hidden;
    box-shadow: inset 0 0 5px rgba(0,0,0,0.2);
    transition: background-color .35s ease;
}

#animalProgressBar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #4caf50, #2e8b57);
    border-radius: 12px;
    transition: width .45s ease;
}

body.dark #animalProgressContainer {
    background: #333;
}

body.dark #animalProgressBar {
    background: linear-gradient(90deg, #6aff6a, #3bd13b);
}
#qrWrapper {
    position: fixed;
    bottom: 12px;
    right: 12px;
    width: 70px;
    height: 70px;
    padding: 6px;
    background: white;
    border-radius: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.25);
    opacity: 0.75;
    transition: opacity .3s ease, background-color .3s ease;
    z-index: 9999;
}

#qrWrapper:hover {
    opacity: 1;
}

#qrCode {
    width: 100%;
    height: 100%;
    border-radius: 8px;
}

/* Dark mode support */
body.dark #qrWrapper {
    background: #222;
    box-shadow: 0 2px 8px rgba(255,255,255,0.15);
}

</style>

<script>
function toggleZoom() {
    const meta = document.querySelector("meta[name=viewport]");
    const btn = document.getElementById("zoomToggleBtn");

    // If zoom is currently enabled → disable it
    if (!meta.dataset.locked) {
        meta.setAttribute(
            "content",
            "width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
        );
        meta.dataset.locked = "true";
        btn.textContent = "Enable Zoom";
    } 
    // If zoom is disabled → re-enable it
    else {
        meta.setAttribute(
            "content",
            "width=device-width, initial-scale=1.0"
        );
        meta.dataset.locked = "";
        btn.textContent = "Disable Zoom";
    }
}

function toggleDarkMode(){
    document.body.classList.toggle("dark");

    // Save preference
    localStorage.setItem("darkMode",
        document.body.classList.contains("dark") ? "on" : "off"
    );

    updateDarkModeButton();
}

function updateDarkModeButton(){
    const btn = document.getElementById("darkModeBtn");
    btn.textContent = document.body.classList.contains("dark")
        ? "Light Mode"
        : "Dark Mode";
}

// Load saved preference on startup
window.addEventListener("load", () => {
    if(localStorage.getItem("darkMode") === "on"){
        document.body.classList.add("dark");
    }
    updateDarkModeButton();
});

function toggleDarkMode(){
    document.body.classList.toggle("dark");

    localStorage.setItem("darkMode",

    if(document.body.classList.contains("dark")){
        btn.textContent = "Light Mode";
    } else {
        btn.textContent = "Dark Mode";
    }
}

// Load saved preference
window.onload = () => {
    if(localStorage.getItem("darkMode") === "on"){

    name: "Mythic Streak",
    description: "Roll 2 Mythic animals in a row.",
    rarity: "celestial",
    progress: function () {
        return window.lastTwoRolls &&
               window.lastTwoRolls.length === 2 &&
               window.lastTwoRolls[0] === "mythic" &&
               window.lastTwoRolls[1] === "mythic";
    }
},
{
    name: "Ancient Discovery",
    description: "Roll your first Ancient animal.",
    rarity: "ancient",
    progress: function () {
        return animals.some(a => a.rarity === "ancient" && a.discovered);
    }
	 name: "In Order!?",
    description: "Roll 2 Mythic animals in a row.",
    rarity: "celestial",
    progress: function () {
        return window.lastFiveRolls &&
               window.lastFiveRolls.length === 5 &&
               window.lastFiveRolls[0] === "common" &&
               window.lastFiveRolls[1] === "uncommon" &&
			   window.lastFiveRolls[2] === "rare" &&
			   window.lastFiveRolls[3] === "epic" &&
			   window.lastFiveRolls[4] === "legendary";
    }
}

];

function rollAnimal(){
 rollCount++;
 let totalWeight=animals.reduce((s,a)=>s+a.chance,0);
 let r=Math.random()*totalWeight,c=0;

 for(let a of animals){
  c+=a.chance;
  if(r<=c){
   a.discovered=true;
updateAnimalProgress();

   recentRarities.push(a.rarity);
   if(recentRarities.length>10)recentRarities.shift();

   if(recentRarities.filter(x=>["epic","legendary","mythic","ancient","celestial"].includes(x)).length>=2)
    luckyStreakAchieved=true;

   let pct=((a.chance/totalWeight)*100).toFixed(3);

   document.getElementById("result").innerHTML=
    `You rolled: <span class="rarity-${a.rarity}"><b>${a.name}</b> (${a.rarity}, ${pct}%)</span>`;

   renderIndex();
   renderAchievements();
   return;
  }
 }
}

function renderIndex(){
 const typeF=document.getElementById("filterType").value;
 const rarF=document.getElementById("filterRarity").value;
 const cont=document.getElementById("indexContainer");
 cont.innerHTML="";

 const total=animals.reduce((s,a)=>s+a.chance,0);
 const rarities=["common","uncommon","rare","epic","legendary","mythic","ancient","celestial"];

 rarities.forEach(r=>{
  let group=animals.filter(a=>
   (typeF==="all"||a.type===typeF)&&
   (rarF==="all"||a.rarity===rarF)&&
   a.rarity===r
  );
  if(group.length===0)return;

  let sec=document.createElement("div");
  sec.innerHTML=`<h2 style="text-align:center;">${r.toUpperCase()}</h2>`;

  let grid=document.createElement("div");
  grid.className="animal-grid";

  group.forEach(a=>{
   let box=document.createElement("div");
   box.className="animal-box";

   let pct=((a.chance/total)*100).toFixed(3);

   if(!a.discovered){
    box.classList.add("unknown");
    box.innerHTML=
     `<div class="name">???</div>
      <div class="rarity">Undiscovered</div>
      <div class="chance">???.???%</div>`;
   }else{
    box.classList.add(a.rarity);
    box.innerHTML=
     `<div class="name">${a.name}</div>
      <div class="rarity rarity-${a.rarity}">${a.rarity.toUpperCase()}</div>
      <div class="chance">${pct}%</div>
      <div class="desc">${a.description}</div>
      <div class="region">Region: ${a.region}</div>`;
   }

   grid.appendChild(box);
  });

  sec.appendChild(grid);
  cont.appendChild(sec);
 });
}

function renderAchievements(){
 const cont=document.getElementById("achievementsContainer");
 cont.innerHTML="";

 achievements.forEach(a=>{
 let box = document.createElement("div");

let unlocked = a.progress();
box.className = `achievement-box achievement-${a.rarity} ${unlocked ? "unlocked" : "locked"}`;


  box.innerHTML=
   `<div class="achievement-title">${unlocked?a.title:"???"}</div>
    <div class="achievement-desc">${unlocked?a.desc:"Unlock this achievement to reveal details."}</div>
    <div class="achievement-progress">Status: ${unlocked?"Unlocked":"Locked"}</div>`;

  cont.appendChild(box);
 });
}

renderAchievements();

function updateAnimalProgress(){
    const discovered = animals.filter(a => a.discovered).length;
    const total = animals.length;

    const pct = (discovered / total) * 100;

    document.getElementById("animalProgressBar").style.width = pct + "%";
    document.getElementById("animalProgressText").textContent =
        `${discovered} / ${total} animals discovered (${pct.toFixed(1)}%)`;
}



// Render index once animals exist
renderIndex();
updateAnimalProgress();

renderAchievements();

</script>
